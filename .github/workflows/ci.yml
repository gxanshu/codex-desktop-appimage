name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-and-smoke:
    name: Rust and Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Check shell syntax
        run: |
          set -euo pipefail
          bash -n install.sh
          bash -n scripts/build-appimage.sh
          bash -n scripts/ci/update-nix-hashes.sh
          bash -n scripts/ci/validate-nix-pins.sh

      - name: Check Node patcher syntax
        run: |
          set -euo pipefail
          node --check scripts/patch-linux-window-ui.js
          node --check scripts/patch-linux-window-ui.test.js
          for file in scripts/patches/*.js; do
            node --check "$file"
          done
          node --check scripts/ci/validate-patch-report.js

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust checks
        run: cargo check --workspace --all-targets

      - name: Run Rust tests
        run: cargo test --workspace --all-targets

      - name: Run script smoke tests
        run: |
          set -euo pipefail
          bash tests/scripts_smoke.sh
          {
            echo "## Rust and Smoke Tests"
            echo ""
            echo "- Shell syntax checks passed."
            echo "- Rust formatting, clippy, check, and tests passed."
            echo "- Script smoke tests passed."
          } >> "$GITHUB_STEP_SUMMARY"

  nix:
    name: Nix Package Builds
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NIX_CONFIG: experimental-features = nix-command flakes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: cachix/install-nix-action@v27

      - name: Install validation dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Validate Nix pins against upstream DMG
        run: scripts/ci/validate-nix-pins.sh

      - name: Check flake evaluation
        run: nix flake check --no-build

      - name: Build Nix package outputs
        run: |
          nix build \
            .#codex-desktop \
            .#codex-desktop-computer-use-ui \
            .#codex-desktop-remote-mobile-control \
            .#codex-desktop-computer-use-ui-remote-mobile-control \
            .#installer \
            --no-link \
            --print-build-logs
